name: Release Go Client

on:
  push:
    tags:
      - "client-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: autoWAL-client-windows-amd64.exe
            build_args: ""
          - os: ubuntu-24.04
            artifact: autoWAL-client-linux-amd64
            build_args: "-tags webkit2_41"
          - os: macos-latest
            artifact: autoWAL-client-macos-universal.zip
            build_args: "-platform darwin/universal"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: client-go/go.mod
          cache-dependency-path: client-go/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client-go/frontend/package-lock.json

      - name: Install Linux WebKit dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build client
        working-directory: client-go
        run: wails build -clean ${{ matrix.build_args }}

      - name: Prepare Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item client-go/build/bin/autoWAL-client.exe client-go/build/bin/${{ matrix.artifact }}

      - name: Prepare Linux artifact
        if: runner.os == 'Linux'
        run: mv client-go/build/bin/autoWAL-client client-go/build/bin/${{ matrix.artifact }}

      - name: Prepare macOS artifact
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent client-go/build/bin/autoWAL-client.app client-go/build/bin/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: client-go/build/bin/${{ matrix.artifact }}

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: client-go/build/bin/${{ matrix.artifact }}
