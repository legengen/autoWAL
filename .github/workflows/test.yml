name: Test

on:
  push:
    branches: [main, develop, "feature/**", "release/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-go@v5
        with:
          go-version-file: client-go/go.mod
          cache-dependency-path: client-go/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client-go/frontend/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Test fresh database, recovery, logging, and fake SMTP
        run: python -m unittest discover -s tests -v
      - name: Test Go RPC client
        working-directory: client-go
        run: go test ./...
      - name: Build frontend
        working-directory: client-go/frontend
        run: |
          npm ci
          npm run build
